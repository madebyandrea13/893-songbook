<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Songbook — HACHI-KYUU-SAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sb {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sb-header {
      padding: 3rem 3rem 0;
    }

    .sb-title-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(3.5rem, 8vw, 6rem);
      line-height: 0.9;
      color: #111;
      letter-spacing: -0.01em;
      display: block;
    }

    .sb-title-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: #b71c1c;
      display: block;
      margin-top: 0.2rem;
      line-height: 1;
    }

    .sb-subtitle {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: #999;
      text-transform: uppercase;
      display: block;
      margin-top: 0.6rem;
    }

    .sb-rule {
      border: none;
      border-top: 2px solid #b71c1c;
      margin: 1.2rem 0 0;
    }

    .sb-body {
      padding: 2.5rem 3rem;
      flex: 1;
    }

    .sb-section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: #b71c1c;
      text-transform: uppercase;
      display: block;
      margin-bottom: 1rem;
    }

    .sb-tracklist {
      list-style: none;
      margin-bottom: 3rem;
    }

    .sb-tracklist li {
      border-bottom: 1px solid #eee;
    }

    .sb-tracklist li:first-child {
      border-top: 1px solid #eee;
    }

    .sb-track {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      text-decoration: none;
      color: #111;
      gap: 1rem;
    }

    .sb-track:hover .sb-track-title {
      color: #b71c1c;
    }

    .sb-track-left {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
    }

    .sb-track-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      color: #ccc;
      min-width: 1.2rem;
    }

    .sb-track-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    .sb-track-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.85rem;
      color: #b71c1c;
      margin-left: 0.5rem;
    }

    .sb-track-links {
      display: flex;
      gap: 1rem;
      flex-shrink: 0;
    }

    .sb-track-links a {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
      text-decoration: none;
      border: 1px solid #ddd;
      padding: 0.3rem 0.7rem;
      font-family: 'Barlow', sans-serif;
      transition: color 0.15s, border-color 0.15s;
    }

    .sb-track-links a:hover {
      color: #b71c1c;
      border-color: #b71c1c;
    }

    .sb-footer {
      padding: 0.9rem 3rem;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sb-footer .left {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #b71c1c;
      text-transform: uppercase;
    }

    .sb-footer .right {
      font-family: 'Barlow', sans-serif;
      font-size: 0.65rem;
      font-style: italic;
      color: #999;
      letter-spacing: 0.05em;
    }

    @media (max-width: 700px) {
      .sb-header { padding: 2rem 1.5rem 0; }
      .sb-body { padding: 2rem 1.5rem; }
      .sb-footer { padding: 0.9rem 1.5rem; flex-direction: column; gap: 0.4rem; align-items: flex-start; }
      .sb-track-jp { display: none; }
    }
  </style>
</head>
<body>

<div class="sb">
  <div class="sb-header">
    <span class="sb-title-main">SONGBOOK</span>
    <span class="sb-title-jp">八九三</span>
    <span class="sb-subtitle">Le musiche del mondo di HACHI-KYUU-SAN</span>
    <hr class="sb-rule">
  </div>

  <div class="sb-body">

    <span class="sb-section-label">また同じ夜に — Keiko Kurosawa</span>
    <ul class="sb-tracklist">
      <li>
        <div class="sb-track">
          <div class="sb-track-left">
            <span class="sb-track-num">01</span>
            <span class="sb-track-title">La mano perdente <span class="sb-track-jp">負け札</span></span>
          </div>
          <div class="sb-track-links">
            <a href="mano-perdente-lore.html">Lore</a>
            <a href="mano-perdente-testi.html">Testi</a>
          </div>
        </div>
      </li>
    </ul>

  </div>

  <div class="sb-footer">
    <span class="left">HACHI-KYUU-SAN — colonna sonora</span>
    <span class="right">Colonna sonora originale di HACHI-KYUU-SAN — 八九三 La mano perdente</span>
  </div>
</div>

</body>
</html>
